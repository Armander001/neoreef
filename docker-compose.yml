# NeoReef Docker Compose
#
# First-time setup — build pipeline image and process landuse data:
#   docker compose build pipeline
#   docker compose run --rm pipeline --config /app/config/cesium_config.json --stage landuse
#   docker compose run --rm pipeline --config /app/config/cesium_config.json --stage manifest
#
# Start the web server:
#   docker compose up -d nginx
#
# Run full pipeline on-demand:
#   docker compose run --rm pipeline --config /app/config/cesium_config.json --stage all
#
# View logs:
#   docker compose logs -f nginx

services:
  # --- Web server (always running) ---
  # NOTE: pipeline-output is the only volume here. The manifest stage copies all
  # HTML viewers into the output dir, so no individual file bind-mounts needed
  # (and they would conflict with the named volume on the same mount point).
  nginx:
    image: nginx:alpine
    ports:
      - "${NEOREEF_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - pipeline-output:/srv/neoreef:ro
    restart: unless-stopped

  # --- Data pipeline (run on demand) ---
  # Uses cesium_config.docker.json which has container-internal paths.
  # Copy cesium_config.docker.json from cesium_config.docker.example.json and
  # fill in CESIUM_ION_TOKEN before running.
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
    volumes:
      - pipeline-output:/app/output
      - ${DATA_SOURCE_DIR:-.}:/app/input:ro
      - ./cesium_config.docker.json:/app/config/cesium_config.json:ro
      # Viewer HTML files must be at Path(__file__).parent so the manifest stage can copy them
      - ./cesium_viewer.html:/app/cesium_viewer.html:ro
      - ./ortho_viewer.html:/app/ortho_viewer.html:ro
      - ./landuse_viewer.html:/app/landuse_viewer.html:ro
    profiles: ["pipeline"]

volumes:
  pipeline-output:
