server {
    listen 80;
    server_name _;

    # Serve NeoReef viewers and data
    root /srv/neoreef;
    index cesium_viewer.html;

    # Performance tuning for large COG files (multi-GB)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    client_max_body_size 0;

    # CORS headers — required for CesiumJS fetch() and range requests
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    # Handle CORS preflight
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }
        try_files $uri $uri/ =404;
    }

    # Cloud Optimized GeoTIFFs — long cache, range requests critical
    location ~* \.tif$ {
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
    }

    # GeoJSON — compress on the fly
    location ~* \.geojson$ {
        types { application/geo+json geojson; }
        gzip on;
        gzip_types application/geo+json application/json;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # HTML viewers — no cache so updates are picked up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # manifest.json — short cache
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*" always;
    }
}
