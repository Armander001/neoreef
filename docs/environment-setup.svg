<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0d9488"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="760" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="52" fill="#0f172a"/>
  <text x="450" y="22" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700" letter-spacing="0.5">NeoReef — Docker &amp; Claude Environment Setup</text>
  <text x="450" y="41" text-anchor="middle" fill="#94a3b8" font-size="11">Two deployment paths: VS Code Dev Container  |  Standalone Docker (Claude Code CLI)</text>

  <!-- ═══════════════════ HOST MACHINE ═══════════════════ -->
  <rect x="30" y="66" width="840" height="100" rx="10" fill="#1e293b" filter="url(#shadow)"/>
  <text x="50" y="86" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">HOST MACHINE</text>
  <!-- env var pills -->
  <rect x="50" y="92" width="180" height="28" rx="5" fill="#0f172a"/>
  <text x="60" y="106" fill="#f472b6" font-size="10" font-weight="600">ANTHROPIC_API_KEY</text>
  <text x="60" y="116" fill="#94a3b8" font-size="9">= sk-ant-…  (runtime secret)</text>

  <rect x="248" y="92" width="160" height="28" rx="5" fill="#0f172a"/>
  <text x="258" y="106" fill="#fb923c" font-size="10" font-weight="600">HTTP_PROXY</text>
  <text x="258" y="116" fill="#94a3b8" font-size="9">proxy.noc.titech.ac.jp:3128</text>

  <rect x="426" y="92" width="160" height="28" rx="5" fill="#0f172a"/>
  <text x="436" y="106" fill="#fb923c" font-size="10" font-weight="600">HTTPS_PROXY</text>
  <text x="436" y="116" fill="#94a3b8" font-size="9">proxy.noc.titech.ac.jp:3128</text>

  <rect x="604" y="92" width="140" height="28" rx="5" fill="#0f172a"/>
  <text x="614" y="106" fill="#a78bfa" font-size="10" font-weight="600">NO_PROXY</text>
  <text x="614" y="116" fill="#94a3b8" font-size="9">localhost,127.0.0.1</text>

  <text x="50" y="153" fill="#64748b" font-size="9.5" font-style="italic">These vars are injected automatically. Inside Tokyo Tech lab: set proxy vars. Outside lab: leave unset — no proxy applied.</text>

  <!-- ══════════════════ LEFT: DEV CONTAINER ══════════════════ -->
  <rect x="30" y="178" width="415" height="554" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="178" width="415" height="34" rx="12" fill="#3b82f6"/>
  <rect x="30" y="196" width="415" height="16" fill="#3b82f6"/>
  <text x="52" y="200" fill="#fff" font-size="13" font-weight="700">VS Code Dev Container</text>
  <text x="52" y="212" fill="#bfdbfe" font-size="10">devcontainer.json  —  full Python + GIS + Claude environment</text>

  <!-- Base image -->
  <rect x="50" y="224" width="375" height="42" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="62" y="239" fill="#1d4ed8" font-size="10" font-weight="700">Base Image</text>
  <text x="62" y="253" fill="#374151" font-size="10">mcr.microsoft.com/devcontainers/python:3.11-bullseye</text>

  <!-- Features -->
  <rect x="50" y="275" width="375" height="56" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="62" y="291" fill="#15803d" font-size="10" font-weight="700">Dev Container Features (auto-installed)</text>
  <rect x="62" y="297" width="80" height="18" rx="4" fill="#bbf7d0"/>
  <text x="102" y="310" text-anchor="middle" fill="#14532d" font-size="9" font-weight="600">conda</text>
  <rect x="152" y="297" width="80" height="18" rx="4" fill="#bbf7d0"/>
  <text x="192" y="310" text-anchor="middle" fill="#14532d" font-size="9" font-weight="600">node</text>
  <text x="62" y="325" fill="#6b7280" font-size="9">ghcr.io/devcontainers/features/conda:1  +  node:1</text>

  <!-- onCreateCommand -->
  <rect x="50" y="340" width="375" height="72" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="62" y="356" fill="#854d0e" font-size="10" font-weight="700">onCreateCommand  (runs once on container creation)</text>
  <rect x="62" y="362" width="351" height="42" rx="5" fill="#1e293b"/>
  <text x="72" y="375" fill="#86efac" font-size="9" font-family="'Cascadia Code','Courier New',monospace">conda install -c conda-forge rasterio geopandas fiona</text>
  <text x="72" y="387" fill="#86efac" font-size="9" font-family="'Cascadia Code','Courier New',monospace">pip install requests boto3</text>
  <text x="72" y="399" fill="#fbbf24" font-size="9" font-family="'Cascadia Code','Courier New',monospace">npm install -g @anthropic-ai/claude-code</text>

  <!-- Injected environment vars -->
  <rect x="50" y="422" width="375" height="72" rx="7" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="62" y="438" fill="#7e22ce" font-size="10" font-weight="700">remoteEnv  (forwarded from host)</text>
  <rect x="62" y="444" width="150" height="16" rx="4" fill="#f3e8ff"/>
  <text x="137" y="456" text-anchor="middle" fill="#6b21a8" font-size="9">ANTHROPIC_API_KEY</text>
  <rect x="220" y="444" width="90" height="16" rx="4" fill="#f3e8ff"/>
  <text x="265" y="456" text-anchor="middle" fill="#6b21a8" font-size="9">HTTP_PROXY</text>
  <rect x="318" y="444" width="97" height="16" rx="4" fill="#f3e8ff"/>
  <text x="366" y="456" text-anchor="middle" fill="#6b21a8" font-size="9">HTTPS_PROXY</text>
  <rect x="62" y="466" width="80" height="16" rx="4" fill="#f3e8ff"/>
  <text x="102" y="478" text-anchor="middle" fill="#6b21a8" font-size="9">NO_PROXY</text>
  <text x="62" y="489" fill="#9ca3af" font-size="9">Values pulled from host via  $&#123;localEnv:VAR&#125;</text>

  <!-- VS Code customizations -->
  <rect x="50" y="504" width="375" height="70" rx="7" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="62" y="520" fill="#9a3412" font-size="10" font-weight="700">VS Code Customizations</text>
  <text x="62" y="534" fill="#374151" font-size="9.5">Extensions:  ms-python.python  |  ms-python.pylint  |  ms-toolsai.jupyter</text>
  <text x="62" y="547" fill="#374151" font-size="9.5">Python interpreter:  /opt/conda/bin/python</text>
  <text x="62" y="560" fill="#374151" font-size="9.5">Terminal env: proxy + API key mirrored into integrated terminal</text>

  <!-- Workspace & user -->
  <rect x="50" y="584" width="375" height="38" rx="7" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="62" y="598" fill="#0369a1" font-size="10" font-weight="700">Workspace &amp; User</text>
  <text x="62" y="611" fill="#374151" font-size="9.5">workspaceFolder: /workspaces/neoreef   |   remoteUser: vscode</text>

  <!-- Port -->
  <rect x="50" y="632" width="375" height="38" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="62" y="646" fill="#15803d" font-size="10" font-weight="700">Port Forwarding</text>
  <text x="62" y="659" fill="#374151" font-size="9.5">54545  →  Claude Code OAuth callback  (silent auto-forward)</text>

  <!-- Claude Code label at bottom -->
  <rect x="50" y="680" width="375" height="36" rx="7" fill="#0f172a"/>
  <text x="237" y="697" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="700">claude  (Claude Code CLI)</text>
  <text x="237" y="710" text-anchor="middle" fill="#94a3b8" font-size="9">available after onCreateCommand via npm global</text>

  <!-- ══════════════════ RIGHT: STANDALONE DOCKER ══════════════════ -->
  <rect x="455" y="178" width="415" height="554" rx="12" fill="#fff" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/>
  <rect x="455" y="178" width="415" height="34" rx="12" fill="#0d9488"/>
  <rect x="455" y="196" width="415" height="16" fill="#0d9488"/>
  <text x="477" y="200" fill="#fff" font-size="13" font-weight="700">Standalone Docker Image</text>
  <text x="477" y="212" fill="#99f6e4" font-size="10">Dockerfile  —  minimal Claude Code CLI container</text>

  <!-- Base image -->
  <rect x="475" y="224" width="375" height="42" rx="7" fill="#f0fdfa" stroke="#5eead4" stroke-width="1"/>
  <text x="487" y="239" fill="#0f766e" font-size="10" font-weight="700">Base Image</text>
  <text x="487" y="253" fill="#374151" font-size="10">node:22-slim  (Debian-slim with Node.js 22)</text>

  <!-- Build args -->
  <rect x="475" y="275" width="375" height="70" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="487" y="291" fill="#854d0e" font-size="10" font-weight="700">Build-time ARGs  (optional proxy, lab use only)</text>
  <rect x="487" y="297" width="351" height="40" rx="5" fill="#1e293b"/>
  <text x="497" y="309" fill="#fbbf24" font-size="9" font-family="'Cascadia Code','Courier New',monospace">docker build \</text>
  <text x="497" y="321" fill="#fbbf24" font-size="9" font-family="'Cascadia Code','Courier New',monospace">  --build-arg HTTP_PROXY=http://proxy.noc.titech.ac.jp:3128 \</text>
  <text x="497" y="333" fill="#fbbf24" font-size="9" font-family="'Cascadia Code','Courier New',monospace">  --build-arg HTTPS_PROXY=… .</text>

  <!-- RUN steps -->
  <rect x="475" y="355" width="375" height="72" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="487" y="371" fill="#15803d" font-size="10" font-weight="700">RUN layers</text>
  <rect x="487" y="378" width="351" height="41" rx="5" fill="#1e293b"/>
  <text x="497" y="391" fill="#86efac" font-size="9" font-family="'Cascadia Code','Courier New',monospace">apt-get install  git  bash  curl</text>
  <text x="497" y="403" fill="#fbbf24" font-size="9" font-family="'Cascadia Code','Courier New',monospace">npm install -g @anthropic-ai/claude-code</text>
  <text x="497" y="415" fill="#94a3b8" font-size="9" font-family="'Cascadia Code','Courier New',monospace"># no Python / GIS stack — Claude CLI only</text>

  <!-- EXPOSE -->
  <rect x="475" y="437" width="375" height="38" rx="7" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="487" y="451" fill="#0369a1" font-size="10" font-weight="700">EXPOSE 54545</text>
  <text x="487" y="464" fill="#374151" font-size="9.5">Claude Code OAuth callback port</text>

  <!-- WORKDIR -->
  <rect x="475" y="485" width="375" height="38" rx="7" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="487" y="499" fill="#6d28d9" font-size="10" font-weight="700">WORKDIR  /workspace</text>
  <text x="487" y="512" fill="#374151" font-size="9.5">Mount your project here:  -v $(pwd):/workspace</text>

  <!-- Runtime env -->
  <rect x="475" y="533" width="375" height="70" rx="7" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="487" y="549" fill="#7e22ce" font-size="10" font-weight="700">Runtime  (docker run)</text>
  <rect x="487" y="555" width="351" height="40" rx="5" fill="#1e293b"/>
  <text x="497" y="568" fill="#fbbf24" font-size="9" font-family="'Cascadia Code','Courier New',monospace">docker run \</text>
  <text x="497" y="580" fill="#f472b6" font-size="9" font-family="'Cascadia Code','Courier New',monospace">  -e ANTHROPIC_API_KEY=sk-ant-… \</text>
  <text x="497" y="592" fill="#86efac" font-size="9" font-family="'Cascadia Code','Courier New',monospace">  -p 54545:54545  -it  &lt;image&gt;</text>

  <!-- ENTRYPOINT -->
  <rect x="475" y="613" width="375" height="38" rx="7" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="487" y="627" fill="#9a3412" font-size="10" font-weight="700">ENTRYPOINT</text>
  <text x="487" y="640" fill="#374151" font-size="9.5">["claude"]  —  container launches directly into Claude Code</text>

  <!-- Claude Code label at bottom -->
  <rect x="475" y="661" width="375" height="55" rx="7" fill="#0f172a"/>
  <text x="662" y="679" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="700">claude  (Claude Code CLI)</text>
  <text x="662" y="693" text-anchor="middle" fill="#94a3b8" font-size="9">entrypoint — runs claude immediately on container start</text>
  <text x="662" y="707" text-anchor="middle" fill="#64748b" font-size="8.5">No GIS stack — use Dev Container for Python/geospatial work</text>

  <!-- ══════════════════ ARROWS FROM HOST ══════════════════ -->
  <!-- arrow to left (dev container) -->
  <line x1="237" y1="166" x2="237" y2="178" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <!-- arrow to right (standalone docker) -->
  <line x1="662" y1="166" x2="662" y2="178" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-teal)"/>

  <!-- label arrows -->
  <text x="174" y="174" fill="#3b82f6" font-size="8.5">env injected</text>
  <text x="599" y="174" fill="#0d9488" font-size="8.5">passed at runtime</text>

  <!-- ══════════════════ SHARED BADGE ══════════════════ -->
  <rect x="330" y="742" width="240" height="14" rx="7" fill="#1e293b"/>
  <text x="450" y="752" text-anchor="middle" fill="#94a3b8" font-size="9">Both paths expose port 54545 for Claude OAuth</text>
</svg>
