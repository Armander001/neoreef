<?xml version="1.0" encoding="UTF-8"?>
<!--
  NeoReef — System Overview
  =========================
  End-to-end data flow from underwater photo capture to browser.
  Edit this file directly; it is not generated.

  LAYOUT GUIDE
  ------------
  Canvas: 1200 x 720
  Five horizontal swim-lanes (y centres):
    Capture .................... y =  90
    Photogrammetry ............. y = 220
    Post-processing ............ y = 350
    Hosting .................... y = 490
    Viewers .................... y = 620
  Lane labels are at x = 30; main components flow left-to-right from x = 200.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"
     font-family="'Segoe UI', system-ui, sans-serif" font-size="13">

  <!-- ============== defs ============== -->
  <defs>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .py    { fill:#cfe1f2; stroke:#1e3a5f; stroke-width:1.5; }
      .vw    { fill:#e1cff2; stroke:#3a1e5f; stroke-width:1.5; }
      .data  { fill:#cff2e1; stroke:#1e5f3a; stroke-width:1.5; }
      .ext   { fill:#f2e1cf; stroke:#5f3a1e; stroke-width:1.5; }
      .infra { fill:#e0e0e0; stroke:#3a3a3a; stroke-width:1.5; }
      .lane-label { font-size:11px; font-weight:700; fill:#666;
                    text-transform:uppercase; letter-spacing:1px; }
      .title      { font-size:13px; font-weight:600; fill:#222; }
      .sub        { font-size:10.5px; font-style:italic; fill:#555; }
      .flow       { fill:none; stroke:#444; stroke-width:1.5;
                    marker-end:url(#arrow-end); }
      .flow-dash  { fill:none; stroke:#666; stroke-width:1.3;
                    stroke-dasharray:4 4; marker-end:url(#arrow-end); }
    </style>
  </defs>

  <!-- ============== title ============== -->
  <text x="600" y="32" text-anchor="middle" font-size="18" font-weight="700"
        fill="#1e3a5f">NeoReef — End-to-end Data Flow</text>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#666">
    Underwater photos → photomosaic + 3D model → web-ready geospatial → on-prem hosting → browser
  </text>

  <!-- ============== lane labels ============== -->
  <text x="30" y= "94" class="lane-label">Capture</text>
  <text x="30" y="224" class="lane-label">Photogrammetry</text>
  <text x="30" y="354" class="lane-label">Post-processing</text>
  <text x="30" y="494" class="lane-label">Hosting</text>
  <text x="30" y="624" class="lane-label">Viewers</text>

  <!-- ============== Lane 1: Capture ============== -->
  <g>
    <rect x="200" y="60" width="200" height="60" rx="8" class="data"/>
    <text x="300" y="82" text-anchor="middle" class="title">TG-7 / OM Workspace</text>
    <text x="300" y="100" text-anchor="middle" class="sub">A..Z subdir per dive transect</text>
    <text x="300" y="113" text-anchor="middle" class="sub">~hundreds of JPEGs per survey</text>

    <rect x="500" y="60" width="220" height="60" rx="8" class="data"/>
    <text x="610" y="82" text-anchor="middle" class="title">Survey folder</text>
    <text x="610" y="100" text-anchor="middle" class="sub">Ishi{YY}_S{NNN}_{MMDD}_A{N}/</text>
    <text x="610" y="113" text-anchor="middle" class="sub">e.g. Ishi25_S008_0915_A1</text>

    <rect x="820" y="60" width="220" height="60" rx="8" class="data"/>
    <text x="930" y="82" text-anchor="middle" class="title">Land-use shapefiles</text>
    <text x="930" y="100" text-anchor="middle" class="sub">国土数値情報 H23 / R02</text>
    <text x="930" y="113" text-anchor="middle" class="sub">Land-useMap_*/</text>
  </g>
  <path d="M400,90 L500,90" class="flow"/>

  <!-- ============== Lane 2: Photogrammetry ============== -->
  <g>
    <rect x="200" y="190" width="240" height="60" rx="8" class="py"/>
    <text x="320" y="212" text-anchor="middle" class="title">Batch_metashape.py</text>
    <text x="320" y="230" text-anchor="middle" class="sub">runs inside Metashape Pro 2.x</text>
    <text x="320" y="243" text-anchor="middle" class="sub">single-folder OR full-year mode</text>

    <rect x="500" y="190" width="180" height="60" rx="8" class="data"/>
    <text x="590" y="212" text-anchor="middle" class="title">*_ortho.tif (TIFF)</text>
    <text x="590" y="230" text-anchor="middle" class="sub">BigTIFF, no GPS</text>
    <text x="590" y="243" text-anchor="middle" class="sub">local mesh coords</text>

    <rect x="700" y="190" width="180" height="60" rx="8" class="data"/>
    <text x="790" y="212" text-anchor="middle" class="title">*.glb + tileset.json</text>
    <text x="790" y="230" text-anchor="middle" class="sub">EXPORT_3D_MODEL=True</text>
    <text x="790" y="243" text-anchor="middle" class="sub">obj2gltf → gltfpack</text>

    <rect x="900" y="190" width="180" height="60" rx="8" class="data"/>
    <text x="990" y="212" text-anchor="middle" class="title">*.jpg preview</text>
    <text x="990" y="230" text-anchor="middle" class="sub">Complete Images/</text>
    <text x="990" y="243" text-anchor="middle" class="sub">{timestamp}/ folder</text>
  </g>
  <path d="M610,120 L320,190" class="flow"/>
  <path d="M440,220 L500,220" class="flow"/>
  <path d="M440,220 C 600,260 700,260 700,220" class="flow"/>
  <path d="M440,220 C 700,290 900,290 900,220" class="flow"/>

  <!-- ============== Lane 3: Post-processing ============== -->
  <g>
    <rect x="200" y="320" width="240" height="60" rx="8" class="py"/>
    <text x="320" y="342" text-anchor="middle" class="title">cesium_pipeline.py</text>
    <text x="320" y="360" text-anchor="middle" class="sub">stages: cog · landuse · model3d</text>
    <text x="320" y="373" text-anchor="middle" class="sub">         · upload · manifest · serve</text>

    <rect x="500" y="320" width="160" height="60" rx="8" class="data"/>
    <text x="580" y="342" text-anchor="middle" class="title">cogs/*.tif</text>
    <text x="580" y="360" text-anchor="middle" class="sub">Cloud-Optimised GeoTIFF</text>
    <text x="580" y="373" text-anchor="middle" class="sub">tiled + overviews</text>

    <rect x="680" y="320" width="170" height="60" rx="8" class="data"/>
    <text x="765" y="342" text-anchor="middle" class="title">landuse/*.geojson</text>
    <text x="765" y="360" text-anchor="middle" class="sub">WGS84 reproject</text>
    <text x="765" y="373" text-anchor="middle" class="sub">TOCHICD-coloured</text>

    <rect x="870" y="320" width="160" height="60" rx="8" class="data"/>
    <text x="950" y="342" text-anchor="middle" class="title">models/*.glb</text>
    <text x="950" y="360" text-anchor="middle" class="sub">tileset.json copies</text>

    <rect x="1050" y="320" width="120" height="60" rx="8" class="data"/>
    <text x="1110" y="342" text-anchor="middle" class="title">manifest.json</text>
    <text x="1110" y="360" text-anchor="middle" class="sub">layer index</text>
    <text x="1110" y="373" text-anchor="middle" class="sub">+ ion asset IDs</text>
  </g>
  <path d="M590,250 L320,320" class="flow"/>
  <path d="M790,250 L320,320" class="flow"/>
  <path d="M930,120 L320,320" class="flow"/>
  <path d="M440,350 L500,350" class="flow"/>
  <path d="M440,350 C 600,400 680,400 680,350" class="flow"/>
  <path d="M440,350 C 750,420 870,420 870,350" class="flow"/>
  <path d="M440,350 C 800,440 1050,440 1050,350" class="flow"/>

  <!-- ============== Lane 4: Hosting ============== -->
  <g>
    <rect x="200" y="460" width="220" height="60" rx="8" class="infra"/>
    <text x="310" y="482" text-anchor="middle" class="title">nginx (Docker)</text>
    <text x="310" y="500" text-anchor="middle" class="sub">port 80, /srv/neoreef</text>
    <text x="310" y="513" text-anchor="middle" class="sub">CORS + range requests</text>

    <rect x="480" y="460" width="220" height="60" rx="8" class="ext"/>
    <text x="590" y="482" text-anchor="middle" class="title">Cesium ion (cloud)</text>
    <text x="590" y="500" text-anchor="middle" class="sub">tiled imagery + 3D Tiles</text>
    <text x="590" y="513" text-anchor="middle" class="sub">USE_ION=true</text>

    <rect x="760" y="460" width="220" height="60" rx="8" class="ext"/>
    <text x="870" y="482" text-anchor="middle" class="title">CesiumJS CDN</text>
    <text x="870" y="500" text-anchor="middle" class="sub">cesium.com 1.117</text>
    <text x="870" y="513" text-anchor="middle" class="sub">Widgets.css</text>

    <rect x="1020" y="460" width="160" height="60" rx="8" class="ext"/>
    <text x="1100" y="482" text-anchor="middle" class="title">OSM tiles</text>
    <text x="1100" y="500" text-anchor="middle" class="sub">tile.openstreetmap.org</text>
  </g>
  <path d="M580,380 L310,460" class="flow"/>
  <path d="M850,380 L310,460" class="flow"/>
  <path d="M1110,380 L310,460" class="flow"/>
  <path d="M1110,380 C 1110,430 590,430 590,460" class="flow-dash"/>

  <!-- ============== Lane 5: Viewers ============== -->
  <g>
    <rect x="200" y="590" width="220" height="60" rx="8" class="vw"/>
    <text x="310" y="612" text-anchor="middle" class="title">cesium_viewer.html</text>
    <text x="310" y="630" text-anchor="middle" class="sub">orthos + landuse + 3D</text>
    <text x="310" y="643" text-anchor="middle" class="sub">+ Pepper's-Ghost mode</text>

    <rect x="480" y="590" width="220" height="60" rx="8" class="vw"/>
    <text x="590" y="612" text-anchor="middle" class="title">ortho_viewer.html</text>
    <text x="590" y="630" text-anchor="middle" class="sub">orthomosaics only</text>

    <rect x="760" y="590" width="220" height="60" rx="8" class="vw"/>
    <text x="870" y="612" text-anchor="middle" class="title">landuse_viewer.html</text>
    <text x="870" y="630" text-anchor="middle" class="sub">land use only</text>

    <rect x="1020" y="590" width="160" height="60" rx="8" class="infra"/>
    <text x="1100" y="612" text-anchor="middle" class="title">Browser</text>
    <text x="1100" y="630" text-anchor="middle" class="sub">Chrome / Firefox / Edge</text>
  </g>
  <path d="M310,520 L310,590" class="flow"/>
  <path d="M310,520 C 310,560 590,560 590,590" class="flow"/>
  <path d="M310,520 C 310,560 870,560 870,590" class="flow"/>
  <path d="M590,520 C 590,560 590,560 590,590" class="flow-dash"/>
  <path d="M850,520 C 870,560 870,560 870,590" class="flow-dash"/>
  <path d="M310,650 L1020,650" class="flow"/>
  <path d="M590,650 L1020,650" class="flow"/>
  <path d="M870,650 L1020,650" class="flow"/>

  <!-- ============== legend ============== -->
  <g transform="translate(40, 670)">
    <rect x="0"   y="0" width="14" height="14" class="py"/>
    <text x="20"  y="12">Python</text>
    <rect x="90"  y="0" width="14" height="14" class="vw"/>
    <text x="110" y="12">Viewer (HTML/JS)</text>
    <rect x="220" y="0" width="14" height="14" class="data"/>
    <text x="240" y="12">Data file</text>
    <rect x="320" y="0" width="14" height="14" class="ext"/>
    <text x="340" y="12">External service</text>
    <rect x="460" y="0" width="14" height="14" class="infra"/>
    <text x="480" y="12">Container / runtime</text>
  </g>
</svg>
