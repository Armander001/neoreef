<?xml version="1.0" encoding="UTF-8"?>
<!--
  NeoReef — Browser Viewers
  =========================
  The three CesiumJS viewer HTMLs and what they consume.
  Edit this file directly; it is not generated.

  LAYOUT GUIDE
  ------------
  Canvas: 1200 x 800
  Centre column (manifest + ion + cdn) at x = 540 .. 760
  Three viewer panels: cesium full (centre, larger), ortho (left), landuse (right)
  External services row at top, fed by all viewers.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"
     font-family="'Segoe UI', system-ui, sans-serif" font-size="13">

  <defs>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .vw    { fill:#e1cff2; stroke:#3a1e5f; stroke-width:1.5; }
      .data  { fill:#cff2e1; stroke:#1e5f3a; stroke-width:1.5; }
      .ext   { fill:#f2e1cf; stroke:#5f3a1e; stroke-width:1.5; }
      .infra { fill:#e0e0e0; stroke:#3a3a3a; stroke-width:1.5; }
      .title { font-size:13px; font-weight:600; fill:#222; }
      .sub   { font-size:10.5px; font-style:italic; fill:#555; }
      .flow      { fill:none; stroke:#444; stroke-width:1.5;
                   marker-end:url(#arrow-end); }
      .flow-dash { fill:none; stroke:#666; stroke-width:1.3;
                   stroke-dasharray:4 4; marker-end:url(#arrow-end); }
      .group-bg { fill:#fafaff; stroke:#3a1e5f; stroke-width:1; stroke-dasharray:6 4; opacity:0.7; }
      .warn { fill:#fff4e0; stroke:#a05a0a; stroke-width:1; }
    </style>
  </defs>

  <text x="600" y="32" text-anchor="middle" font-size="18" font-weight="700"
        fill="#3a1e5f">Browser Viewers — three single-file HTML apps</text>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#666">
    Must be served over HTTP (file:// breaks fetch). Cesium 1.117 from CDN, no build step.
  </text>

  <!-- ============== External services ============== -->
  <g>
    <rect x="60" y="80" width="200" height="55" rx="8" class="ext"/>
    <text x="160" y="102" text-anchor="middle" class="title">CesiumJS CDN</text>
    <text x="160" y="120" text-anchor="middle" class="sub">cesium.com 1.117</text>

    <rect x="290" y="80" width="200" height="55" rx="8" class="ext"/>
    <text x="390" y="102" text-anchor="middle" class="title">Cesium ion</text>
    <text x="390" y="120" text-anchor="middle" class="sub">imagery + 3D Tiles assets</text>

    <rect x="520" y="80" width="200" height="55" rx="8" class="ext"/>
    <text x="620" y="102" text-anchor="middle" class="title">Cesium World Terrain</text>
    <text x="620" y="120" text-anchor="middle" class="sub">createWorldTerrainAsync()</text>

    <rect x="750" y="80" width="200" height="55" rx="8" class="ext"/>
    <text x="850" y="102" text-anchor="middle" class="title">OpenStreetMap tiles</text>
    <text x="850" y="120" text-anchor="middle" class="sub">cesium_viewer base layer</text>

    <rect x="980" y="80" width="180" height="55" rx="8" class="ext"/>
    <text x="1070" y="102" text-anchor="middle" class="title">Google Photoreal 3D</text>
    <text x="1070" y="120" text-anchor="middle" class="sub">via base_ion_3dtiles_asset</text>
  </g>

  <!-- ============== Manifest hub ============== -->
  <rect x="450" y="180" width="300" height="90" rx="8" class="data"/>
  <text x="600" y="202" text-anchor="middle" class="title">manifest.json</text>
  <text x="600" y="220" text-anchor="middle" class="sub">orthomosaics[] — survey_name, ortho_type,</text>
  <text x="600" y="234" text-anchor="middle" class="sub">bbox_wgs84, ion_asset_id, cog_url</text>
  <text x="600" y="250" text-anchor="middle" class="sub">landuse_layers[] · models_3d[] · survey_area</text>
  <text x="600" y="264" text-anchor="middle" class="sub">cesium_ion_token · base_ion_3dtiles_asset</text>

  <!-- ============== Three viewer panels ============== -->
  <!-- Ortho viewer (left) -->
  <rect x="40" y="320" width="320" height="280" rx="10" class="group-bg"/>
  <text x="200" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#3a1e5f">ortho_viewer.html</text>
  <text x="200" y="358" text-anchor="middle" class="sub">350 LOC · cyan #7ec8e3 accent</text>

  <rect x="60" y="372" width="280" height="40" rx="6" class="vw"/>
  <text x="200" y="390" text-anchor="middle" class="title">addOrthoLayer(rec)</text>
  <text x="200" y="404" text-anchor="middle" class="sub">GroundPrimitive (local) or IonImagery</text>

  <rect x="60" y="420" width="280" height="40" rx="6" class="vw"/>
  <text x="200" y="438" text-anchor="middle" class="title">flyToOrtho / flyToIsland</text>
  <text x="200" y="452" text-anchor="middle" class="sub">camera flyTo bbox or center</text>

  <rect x="60" y="468" width="280" height="40" rx="6" class="vw"/>
  <text x="200" y="486" text-anchor="middle" class="title">buildToolbar()</text>
  <text x="200" y="500" text-anchor="middle" class="sub">card per ortho · checkbox · opacity</text>

  <rect x="60" y="516" width="280" height="76" rx="6" class="vw"/>
  <text x="200" y="538" text-anchor="middle" class="title">init()</text>
  <text x="200" y="554" text-anchor="middle" class="sub">load manifest → set ion token</text>
  <text x="200" y="568" text-anchor="middle" class="sub">create Viewer (scene3DOnly, no Bing)</text>
  <text x="200" y="582" text-anchor="middle" class="sub">terrain + dark globe baseColor</text>

  <!-- Cesium viewer (centre, larger) -->
  <rect x="400" y="320" width="400" height="380" rx="10" class="group-bg"/>
  <text x="600" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#3a1e5f">cesium_viewer.html — main</text>
  <text x="600" y="358" text-anchor="middle" class="sub">962 LOC · superset of all features</text>

  <rect x="420" y="372" width="360" height="40" rx="6" class="vw"/>
  <text x="600" y="390" text-anchor="middle" class="title">addOrthoLayer + addLanduseLayer</text>
  <text x="600" y="404" text-anchor="middle" class="sub">stores {ground, lifted, _show, _alpha}</text>

  <rect x="420" y="420" width="360" height="40" rx="6" class="vw"/>
  <text x="600" y="438" text-anchor="middle" class="title">toggleSeparation(btn)</text>
  <text x="600" y="452" text-anchor="middle" class="sub">lifts each layer to LAYER_SEP_M altitude</text>

  <rect x="420" y="468" width="360" height="40" rx="6" class="vw"/>
  <text x="600" y="486" text-anchor="middle" class="title">toggle3DTiles(btn)</text>
  <text x="600" y="500" text-anchor="middle" class="sub">show/hide _base3DTileset to see ortho</text>

  <rect x="420" y="516" width="360" height="40" rx="6" class="vw"/>
  <text x="600" y="534" text-anchor="middle" class="title">buildLegend / buildToolbar</text>
  <text x="600" y="548" text-anchor="middle" class="sub">groups: Drone · Coral · Land Use</text>

  <rect x="420" y="564" width="360" height="40" rx="6" class="vw"/>
  <text x="600" y="582" text-anchor="middle" class="title">3D model loader</text>
  <text x="600" y="596" text-anchor="middle" class="sub">Cesium3DTileset.fromUrl OR Model.fromGltfAsync</text>

  <rect x="420" y="612" width="360" height="76" rx="6" fill="#fff4e0" stroke="#a05a0a" stroke-width="1.5"/>
  <text x="600" y="634" text-anchor="middle" class="title">Pepper's Ghost mode</text>
  <text x="600" y="650" text-anchor="middle" class="sub">?mode=peppers-ghost &amp;mirror=true &amp;speed=0.1</text>
  <text x="600" y="664" text-anchor="middle" class="sub">black scene · UI hidden · auto-rotation</text>
  <text x="600" y="678" text-anchor="middle" class="sub">camera locked, no input</text>

  <!-- Landuse viewer (right) -->
  <rect x="840" y="320" width="320" height="280" rx="10" class="group-bg"/>
  <text x="1000" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#3a1e5f">landuse_viewer.html</text>
  <text x="1000" y="358" text-anchor="middle" class="sub">438 LOC · purple #c8b4ff accent</text>

  <rect x="860" y="372" width="280" height="40" rx="6" class="vw"/>
  <text x="1000" y="390" text-anchor="middle" class="title">addLanduseLayer(rec)</text>
  <text x="1000" y="404" text-anchor="middle" class="sub">GeoJsonDataSource → extruded polygons</text>

  <rect x="860" y="420" width="280" height="40" rx="6" class="vw"/>
  <text x="1000" y="438" text-anchor="middle" class="title">toggleSeparation(btn)</text>
  <text x="1000" y="452" text-anchor="middle" class="sub">layers float at LAYER_SEP_M intervals</text>

  <rect x="860" y="468" width="280" height="40" rx="6" class="vw"/>
  <text x="1000" y="486" text-anchor="middle" class="title">buildLegend(activeCodes)</text>
  <text x="1000" y="500" text-anchor="middle" class="sub">only TOCHICD codes present in data</text>

  <rect x="860" y="516" width="280" height="76" rx="6" class="vw"/>
  <text x="1000" y="538" text-anchor="middle" class="title">init()</text>
  <text x="1000" y="554" text-anchor="middle" class="sub">load manifest → no base imagery</text>
  <text x="1000" y="568" text-anchor="middle" class="sub">dark globe baseColor #060912</text>
  <text x="1000" y="582" text-anchor="middle" class="sub">terrain only</text>

  <!-- ============== Browser ============== -->
  <rect x="500" y="720" width="200" height="60" rx="8" class="infra"/>
  <text x="600" y="742" text-anchor="middle" class="title">Browser</text>
  <text x="600" y="760" text-anchor="middle" class="sub">Chrome / Firefox / Edge</text>

  <!-- ============== Manifest fan-in / fan-out ============== -->
  <path d="M200,372 C 200,330 450,300 600,270" class="flow-dash"/>
  <path d="M600,300 L600,372" class="flow"/>
  <path d="M1000,372 C 1000,330 750,300 600,270" class="flow-dash"/>

  <!-- External fans down to viewers -->
  <path d="M160,135 L200,372" class="flow-dash"/>
  <path d="M390,135 L600,372" class="flow-dash"/>
  <path d="M620,135 L600,372" class="flow-dash"/>
  <path d="M850,135 C 600,200 600,300 600,372" class="flow-dash"/>
  <path d="M1070,135 L600,372" class="flow-dash"/>
  <path d="M620,135 C 620,200 1000,300 1000,372" class="flow-dash"/>

  <!-- Local data sources fed via manifest URLs -->
  <rect x="100" y="650" width="160" height="60" rx="8" class="data"/>
  <text x="180" y="672" text-anchor="middle" class="title">cogs/*.tif</text>
  <text x="180" y="690" text-anchor="middle" class="sub">via cog_url (range req)</text>
  <text x="180" y="703" text-anchor="middle" class="sub">used by ortho/cesium</text>

  <rect x="900" y="650" width="200" height="60" rx="8" class="data"/>
  <text x="1000" y="672" text-anchor="middle" class="title">landuse/*.geojson</text>
  <text x="1000" y="690" text-anchor="middle" class="sub">always loaded local — ion strips</text>
  <text x="1000" y="703" text-anchor="middle" class="sub">custom props (TOCHICD)</text>

  <path d="M180,650 L200,600" class="flow"/>
  <path d="M180,650 C 180,640 420,630 420,600" class="flow"/>
  <path d="M1000,650 L1000,600" class="flow"/>
  <path d="M1000,650 C 1000,640 780,630 780,600" class="flow"/>

  <!-- Browser arrows -->
  <path d="M200,600 L600,720" class="flow"/>
  <path d="M600,700 L600,720" class="flow"/>
  <path d="M1000,600 L600,720" class="flow"/>

  <!-- ============== Drift warning ============== -->
  <rect x="40" y="720" width="380" height="60" rx="8" class="warn"/>
  <text x="230" y="742" text-anchor="middle" class="title">⚠ TOCHICD label drift</text>
  <text x="230" y="758" text-anchor="middle" class="sub">cesium_viewer + landuse_viewer disagree</text>
  <text x="230" y="772" text-anchor="middle" class="sub">on codes 12, 13, 15, 16, 17 — see report §3.2.1</text>

  <!-- ============== legend ============== -->
  <g transform="translate(750, 730)">
    <rect x="0"   y="0" width="14" height="14" class="vw"/>
    <text x="20"  y="12">Viewer (HTML/JS)</text>
    <rect x="140" y="0" width="14" height="14" class="data"/>
    <text x="160" y="12">Local data file</text>
    <rect x="270" y="0" width="14" height="14" class="ext"/>
    <text x="290" y="12">External service</text>
  </g>
</svg>
